<!DOCTYPE html>
<html>
    <body>
        <h2>JavaScript no corpo da página</h2>
        <p id="demo">Exemplo de parágrafo.</p>
        <button type="button" onclick="mudaParagrafo()">Mudar</button>

        <script>
            function mudaParagrafo() {
                document.getElementById("demo").innerHTML = "Parágrafo alterado";
            }
        </script>
    </body>
</html>
