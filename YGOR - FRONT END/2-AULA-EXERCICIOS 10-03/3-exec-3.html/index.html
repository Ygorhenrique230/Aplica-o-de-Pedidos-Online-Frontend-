<!DOCTYPE html>
<html>
    <body>
        <h2>Função anônima</h2>
        <script>
            var message = function (mensagem) {
                alert(mensagem);
            }

            //acionando a função mensagem com passagem de parâmetro
            message("Este exemplo é de uma função anônima");
        </script>
    </body>
</html>
